<div class="page-bg">
  <div class="container">
    <div class="form-card">

      <h2 class="form-title">Educational Qualifications</h2>
      <p class="form-subtitle">Provide your academic details accurately</p>

      <!-- SSC -->
      <div class="form-section">
        <h4>SSC / Equivalent</h4>

        <div class="form-grid">
          <div class="form-field">
            <label>Group</label>
            <select class="input"
                    name="sscGroup"
                    [(ngModel)]="eduData.sscGroup">
              <option value="">Select Group</option>
              <option *ngFor="let item of groupList" [value]="item.key">
                {{ item.value }}
              </option>
            </select>
          </div>

          <div class="form-field">
            <label>Passing Year</label>
            <input class="input"
                   type="text"
                   name="sscPY"
                   [(ngModel)]="eduData.sscPY">
          </div>

          <div class="form-field">
            <label>Result</label>
            <select class="input"
                    name="sscResult"
                    [(ngModel)]="eduData.sscResult">
              <option value="">Select Result</option>
              <option *ngFor="let item of ResultList" [value]="item.key">
                {{ item.value }}
              </option>
            </select>
          </div>

          <div class="form-field full">
            <label>Institution Name</label>
            <input class="input"
                   type="text"
                   name="sscInsName"
                   [(ngModel)]="eduData.sscInsName">
          </div>
        </div>
      </div>

      <!-- HSC -->
      <div class="form-section">
        <h4>HSC / Equivalent</h4>

        <div class="form-grid">
          <div class="form-field">
            <label>Group</label>
            <select class="input"
                    name="hscGroup"
                    [(ngModel)]="eduData.hscGroup">
              <option value="">Select Group</option>
              <option *ngFor="let item of groupList" [value]="item.key">
                {{ item.value }}
              </option>
            </select>
          </div>

          <div class="form-field">
            <label>Passing Year</label>
            <input class="input"
                   type="text"
                   name="hscPY"
                   [(ngModel)]="eduData.hscPY">
          </div>

          <div class="form-field">
            <label>Result</label>
            <select class="input"
                    name="hscResult"
                    [(ngModel)]="eduData.hscResult">
              <option value="">Select Result</option>
              <option *ngFor="let item of ResultList" [value]="item.key">
                {{ item.value }}
              </option>
            </select>
          </div>

          <div class="form-field full">
            <label>Institution Name</label>
            <input class="input"
                   type="text"
                   name="hscInsName"
                   [(ngModel)]="eduData.hscInsName">
          </div>
        </div>
      </div>

      <!-- Graduation -->
      <div class="form-section">
        <h4>Undergraduate / Graduation</h4>

        <div class="form-grid">
          <div class="form-field">
            <label>Passing Year</label>
            <input class="input"
                   type="text"
                   name="ugPY"
                   [(ngModel)]="eduData.ugPY">
          </div>

          <div class="form-field">
            <label>Subject</label>
            <input class="input"
                   type="text"
                   name="gSubject"
                   [(ngModel)]="eduData.gSubject">
          </div>

          <div class="form-field full">
            <label>Institution Name</label>
            <input class="input"
                   type="text"
                   name="ugInsName"
                   [(ngModel)]="eduData.ugInsName">
          </div>
        </div>
      </div>

      <!-- Other -->
      <div class="form-section">
        <h4>Other Details</h4>

        <textarea class="input"
                  rows="4"
                  name="otherDetails"
                  [(ngModel)]="eduData.otherDetails"></textarea>

        <div class="hint">
          Include institution, subject, and year if applicable.
        </div>
      </div>

      <!-- Buttons -->
      <div class="form-actions">
        <button class="btn btn-secondary">Back</button>
        <button class="btn btn-primary" (click)="onSave()">Save & Next</button>
      </div>

    </div>
  </div>
</div>
