<div class="stats-wrapper">
  <h2 class="title">Bondhon Media User Statistics</h2>

  <div class="stats-grid">

    <!-- Total Profiles -->
    <div class="stat-card">
      <img src="assets/Img/images.jpg" class="icon" />
      <p class="label">Total Bride & Groom Profiles</p>
      <h3 class="count">{{ totalAll | number }}</h3>
    </div>

    <!-- Total Male -->
    <div class="stat-card">
      <img src="assets/Img/male.jpg" class="icon" />
      <p class="label">Total Groom Profiles</p>
      <h3 class="count">{{ totalMale | number }}</h3>
    </div>

    <!-- Total Female -->
    <div class="stat-card">
      <img src="assets/Img/female.png" class="icon" />
      <p class="label">Total Bride Profiles</p>
      <h3 class="count">{{ totalFemale | number }}</h3>
    </div>

    <!-- Successful Marriage -->
    <div class="stat-card">
      <img src="assets/Img/Marriage.png" class="icon" />
      <p class="label">Successful Marriages</p>
      <h3 class="count">{{ totalMarriage | number }}+</h3>
    </div>

  </div>
</div>
