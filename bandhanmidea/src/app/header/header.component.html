<header class="site-header">

  <!-- Brand -->
  <a class="brand" routerLink="/">
    <div class="logo">
      <img src="assets/Img/logo.png" alt="Bondhon Media Center Logo" />
    </div>
    <div class="brand-text">
      <h1>Bondhon Media Center</h1>
      <p>Trusted matchmaking service for local and overseas brides and grooms</p>
    </div>
  </a>

  <!-- Right Side -->
  <div class="right-section">

    <!-- Navigation -->
    <nav [class.active]="isMenuOpen" class="top-nav">
      <a routerLink="/how-it-works">How It Works</a>
      <a routerLink="/profiles">Profiles</a>

      <!-- Auth -->
      <ng-container *ngIf="!userName; else loggedIn">
        <a class="cta" (click)="goToLogin()">Join for Free</a>
      </ng-container>

      <ng-template #loggedIn>
        <div class="user-menu">
          <span class="user-name">{{ userName }}</span>
          <button class="logout-btn" (click)="logout()">Logout</button>
        </div>
      </ng-template>

    </nav>

    <!-- Hamburger -->
    <div class="hamburger" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>
</header>
