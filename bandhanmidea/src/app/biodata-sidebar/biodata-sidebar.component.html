<!-- Toggle Button (Mobile only) -->
<button class="sidebar-toggle" (click)="toggleSidebar()">
  ☰
</button>

<!-- Sidebar -->
<div class="sidebar" [class.open]="isSidebarOpen">
  <div class="profile-box">
    <img src="assets/avatar.svg" class="avatar">
    <h4>Biodata Status</h4>
    <button class="complete-btn">Complete Biodata</button>
  </div>

  <ul class="menu">
    <li class="menu-item active">Edit Biodata</li>
    <li class="menu-item">Favorites</li>
    <li class="menu-item">My Account</li>
    <li class="menu-item">Settings</li>
    <li class="menu-item">Logout</li>
  </ul>
</div>

<!-- Overlay -->
<div class="sidebar-overlay"
     *ngIf="isSidebarOpen"
     (click)="toggleSidebar()">
</div>
