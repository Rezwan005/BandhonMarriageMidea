<div class="page-bg">
  <div class="form-wrapper">

    <h2 class="form-title">General Information</h2>
    <p class="form-subtitle">Tell us about yourself</p>

    <form #form="ngForm" (ngSubmit)="save(form)" novalidate>

      <div class="form-grid">

        <!-- Biodata Type -->
        <div class="form-group">
          <label>Biodata Type *</label>
          <select class="form-control"
                  name="biodataType"
                  [(ngModel)]="biodata.biodataType"
                  #biodataType="ngModel"
                  required>
            <option [ngValue]="null">Select Biodata Type</option>
            <option *ngFor="let item of BiodataTypeList" [ngValue]="item.key">
              {{ item.value }}
            </option>
          </select>
          <small class="error" *ngIf="biodataType.invalid && biodataType.touched">
            Biodata type is required
          </small>
        </div>

        <!-- Marital Status -->
        <div class="form-group">
          <label>Marital Status *</label>
          <select class="form-control"
                  name="maritalStatus"
                  [(ngModel)]="biodata.maritalStatus"
                  #maritalStatus="ngModel"
                  required>
            <option [ngValue]="null">Select Marital Status</option>
            <option *ngFor="let item of MeritalStatusList" [ngValue]="item.key">
              {{ item.value }}
            </option>
          </select>
          <small class="error" *ngIf="maritalStatus.invalid && maritalStatus.touched">
            Marital status is required
          </small>
        </div>

        <!-- Birth Date -->
        <div class="form-group">
          <label>Birth Date *</label>
          <input type="date"
                 class="form-control"
                 name="birthDate"
                 [(ngModel)]="biodata.birthDate"
                 #birthDate="ngModel"
                 required>
          <small class="error" *ngIf="birthDate.invalid && birthDate.touched">
            Birth date is required
          </small>
        </div>

        <!-- Age -->
        <div class="form-group">
          <label>Age *</label>
          <input type="number"
                 class="form-control"
                 name="age"
                 [(ngModel)]="biodata.age"
                 #age="ngModel"
                 required
                 min="18"
                 max="70">
          <small class="error" *ngIf="age.invalid && age.touched">
            Age must be between 18 and 70
          </small>
        </div>

        <!-- Height -->
        <div class="form-group">
          <label>Height *</label>
          <input type="text"
                 class="form-control"
                 name="height"
                 placeholder="Example: 5 feet 6 inches"
                 [(ngModel)]="biodata.height"
                 #height="ngModel"
                 required>
          <small class="error" *ngIf="height.invalid && height.touched">
            Height is required
          </small>
        </div>

        <!-- Complexion -->
        <div class="form-group">
          <label>Complexion *</label>
          <select class="form-control"
                  name="skinTone"
                  [(ngModel)]="biodata.skinTone"
                  #skinTone="ngModel"
                  required>
            <option [ngValue]="null">Select Complexion</option>
            <option *ngFor="let item of SkinToneList" [ngValue]="item.key">
              {{ item.value }}
            </option>
          </select>
          <small class="error" *ngIf="skinTone.invalid && skinTone.touched">
            Complexion is required
          </small>
        </div>

        <!-- Weight -->
        <div class="form-group">
          <label>Weight (kg) *</label>
          <input type="number"
                 class="form-control"
                 name="weight"
                 [(ngModel)]="biodata.weight"
                 #weight="ngModel"
                 required
                 min="30"
                 max="200">
          <small class="error" *ngIf="weight.invalid && weight.touched">
            Weight must be between 30 and 200 kg
          </small>
        </div>

        <!-- Blood Group -->
        <div class="form-group">
          <label>Blood Group *</label>
          <select class="form-control"
                  name="bloodGroup"
                  [(ngModel)]="biodata.bloodGroup"
                  #bloodGroup="ngModel"
                  required>
            <option [ngValue]="null">Select Blood Group</option>
            <option *ngFor="let item of BloodGroupList" [ngValue]="item.key">
              {{ item.value }}
            </option>
          </select>
          <small class="error" *ngIf="bloodGroup.invalid && bloodGroup.touched">
            Blood group is required
          </small>
        </div>

        <!-- Nationality -->
        <div class="form-group full-width">
          <label>Nationality *</label>
          <select class="form-control"
                  name="nationality"
                  [(ngModel)]="biodata.nationality"
                  required>
            <option value="Bangladeshi">Bangladeshi</option>
          </select>
        </div>

      </div>

      <button type="submit"
              class="btn-save"
              [disabled]="form.invalid || isSaving">
        {{ isSaving ? 'Saving...' : 'Save & Continue' }}
      </button>

    </form>

  </div>
</div>
