<div class="stepper-container">
  <div *ngFor="let step of steps"
       class="step-item"
       [class.active]="step.stepId === currentStep"
       [class.completed]="step.isCompleted"

       (click)=" goToStep(step.stepId)">

    <div class="circle">
      {{ step.isCompleted ? '✓' : step.stepId }}
    </div>
    <div class="label">{{ step.stepName }}</div>
  </div>
</div>
