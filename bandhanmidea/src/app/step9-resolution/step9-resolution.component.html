<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-7">

      <div>
        <h2 class="form-title">অঙ্গীকারনামা</h2>
        <hr class="title-divider mb-4">

        <form #pledgeForm="ngForm">
          <div class="mb-4">
            <label class="custom-label">OrdhekDeen.com ওয়েবসাইটে বায়োডাটা জমা দিচ্ছেন, তা আপনার অভিভাবক জানেন? <span class="text-danger">*</span></label>
            <select class="form-select custom-input" name="aware" [(ngModel)]="formData.guardianAware" required>
              <option value="">নির্বাচন করুন</option>
              <option value="yes">হ্যাঁ</option>
              <option value="no">না</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="custom-label">আল্লাহ'র শপথ করে সাক্ষ্য দিন, যে তথ্যগুলো দিয়েছেন সব সত্য? <span class="text-danger">*</span></label>
            <select class="form-select custom-input" name="truth" [(ngModel)]="formData.informationTruth" required>
              <option value="">নির্বাচন করুন</option>
              <option value="yes">জি, সব সত্য</option>
            </select>
          </div>

          <div class="mb-5">
            <label class="custom-label">কোনো মিথ্যা তথ্য প্রদান করলে কর্তৃপক্ষ দায়ভার নিবে না। আপনি কি সম্মত? <span class="text-danger">*</span></label>
            <select class="form-select custom-input" name="agree" [(ngModel)]="formData.authorityLiabilityAgreement" required>
              <option value="">নির্বাচন করুন</option>
              <option value="yes">জি, আমি সম্মত</option>
            </select>
          </div>

          <div class="d-flex justify-content-between">
            <button type="button" class="btn btn-back px-5" (click)="currentStep = 'partner'">Back</button>
            <button type="button" class="btn btn-save px-5" [disabled]="!pledgeForm.valid" (click)="onSave()">Submit Biodata</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
