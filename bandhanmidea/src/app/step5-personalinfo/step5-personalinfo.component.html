<div class="page-bg">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">

        <div class="form-card">
          <h3 class="form-title">Personal Information</h3>
          <p class="form-subtitle">Tell us about yourself</p>

          <!-- Lifestyle -->
          <div class="section-card">
            <h5>Lifestyle & Habits</h5>

            <div class="form-group">
              <label>What kind of clothes do you usually wear outside?</label>
              <input type="text"
                     class="form-control"
                     name="dressOutside"
                     [(ngModel)]="data.dressOutside">
              <div class="hint-text">
                Example: Wear burqa with hijab, do not wear niqab
              </div>
            </div>

            <div class="form-group">
              <label>Do you have any mental or physical diseases?</label>
              <input type="text"
                     class="form-control"
                     name="diseaseInfo"
                     [(ngModel)]="data.diseaseInfo">
            </div>

            <div class="form-group">
              <label>Are you involved in any special work?</label>
              <input type="text"
                     class="form-control"
                     name="specialWork"
                     [(ngModel)]="data.specialWork">
            </div>

            <div class="form-group">
              <label>About Yourself</label>
              <textarea class="form-control"
                        rows="4"
                        name="aboutYourself"
                        [(ngModel)]="data.aboutYourself">
              </textarea>
            </div>

            <div class="form-group">
              <label>Groom's Mobile Number</label>
              <input type="text"
                     class="form-control"
                     name="mobileNo"
                     [(ngModel)]="data.mobileNo">
            </div>
          </div>

          <!-- Photo Upload -->
          <div class="section-card text-center">
            <h5>Selfie Upload</h5>

            <div class="photo-upload" (click)="fileInput.click()">

              <div *ngIf="!previewUrl" class="upload-placeholder">
                <div class="upload-icon">📷</div>
                <div>Click to upload selfie</div>
              </div>

              <img *ngIf="previewUrl"
                   [src]="previewUrl"
                   class="preview-img">
            </div>

            <input type="file"
                   #fileInput
                   hidden
                   accept="image/*"
                   (change)="onFileSelected($event)" />

            <div *ngIf="previewUrl"
                 class="remove-photo"
                 (click)="removePhoto()">
              Remove photo
            </div>
          </div>

          <!-- Button -->
          <div class="button-row">
            <button class="btn btn-primary w-100"
                    (click)="onSave()">
              Save & Next
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
