<div class="page-bg">
  <div class="form-wrapper">

    <h2 class="form-title">Address Details</h2>
    <p class="form-subtitle">Please provide your permanent and current address</p>

    <!-- Permanent Address -->
    <div class="card-section">
      <h4 class="section-title">Permanent Address</h4>

      <div class="form-grid">

        <div class="form-group">
          <label>Division</label>
          <select class="form-control"
                  [(ngModel)]="formData.permanentDivisionId"
                  (change)="onPermanentDivisionChange()">
            <option [ngValue]="null">Select Division</option>
            <option *ngFor="let d of divisions" [ngValue]="d.id">{{ d.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>District</label>
          <select class="form-control"
                  [(ngModel)]="formData.permanentDistrictId"
                  (change)="onPermanentDistrictChange()"
                  [disabled]="!permanentDistricts.length">
            <option [ngValue]="null">Select District</option>
            <option *ngFor="let d of permanentDistricts" [ngValue]="d.id">{{ d.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Upazila</label>
          <select class="form-control"
                  [(ngModel)]="formData.permanentUpazilaId"
                  (change)="onPermanentUpazilaChange()"
                  [disabled]="!permanentUpazilas.length">
            <option [ngValue]="null">Select Upazila</option>
            <option *ngFor="let u of permanentUpazilas" [ngValue]="u.id">{{ u.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Union / Village</label>
          <select class="form-control"
                  [(ngModel)]="formData.permanentVillage"
                  [disabled]="!permanentVillages.length">
            <option value="">Select Village</option>
            <option *ngFor="let v of permanentVillages" [value]="v.name">{{ v.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Road / Street</label>
          <input type="text" class="form-control"
                 [(ngModel)]="formData.permanentRoad">
        </div>

        <div class="form-group">
          <label>House / Building</label>
          <input type="text" class="form-control"
                 [(ngModel)]="formData.permanentHouse">
        </div>

      </div>
    </div>


    <!-- Current Address -->
    <div class="card-section">
      <h4 class="section-title">Current Address</h4>

      <div class="checkbox-box">
        <input type="checkbox"
               [(ngModel)]="formData.isSameAddress"
               (change)="toggleSameAddress()">
        <span>Same as Permanent Address</span>
      </div>

      <div class="form-grid">

        <div class="form-group">
          <label>Division</label>
          <select class="form-control"
                  [(ngModel)]="formData.currentDivisionId"
                  (change)="onCurrentDivisionChange()">
            <option [ngValue]="null">Select Division</option>
            <option *ngFor="let d of divisions" [ngValue]="d.id">{{ d.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>District</label>
          <select class="form-control"
                  [(ngModel)]="formData.currentDistrictId"
                  (change)="onCurrentDistrictChange()"
                  [disabled]="!currentDistricts.length">
            <option [ngValue]="null">Select District</option>
            <option *ngFor="let d of currentDistricts" [ngValue]="d.id">{{ d.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Upazila</label>
          <select class="form-control"
                  [(ngModel)]="formData.currentUpazilaId"
                  (change)="onCurrentUpazilaChange()"
                  [disabled]="!currentUpazilas.length">
            <option [ngValue]="null">Select Upazila</option>
            <option *ngFor="let u of currentUpazilas" [ngValue]="u.id">{{ u.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Union / Village</label>
          <select class="form-control"
                  [(ngModel)]="formData.currentVillage"
                  [disabled]="!currentVillages.length">
            <option value="">Select Village</option>
            <option *ngFor="let v of currentVillages" [value]="v.name">{{ v.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Road / Street</label>
          <input type="text" class="form-control"
                 [(ngModel)]="formData.currentRoad">
        </div>

        <div class="form-group">
          <label>House / Building</label>
          <input type="text" class="form-control"
                 [(ngModel)]="formData.currentHouse">
        </div>

      </div>
    </div>

    <button class="btn-save" (click)="onSave()">Save & Continue</button>

  </div>
</div>
