<app-header></app-header>

<div class="page-container">

  <!-- Mobile Filter Button -->
  <button class="filter-toggle" (click)="toggleFilter()">
    ☰ Filters
  </button>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="isFilterOpen">
    <app-filters (filterChanged)="loadProfiles($event)"></app-filters>
  </aside>

  <!-- Main Content -->
  <section class="content">
    <app-profile-list [profiles]="profiles"></app-profile-list>
  </section>

</div>

<!-- Mobile Overlay -->
<div class="overlay" *ngIf="isFilterOpen" (click)="toggleFilter()"></div>

<app-footer></app-footer>
